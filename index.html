<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Concert Archive</title>

  <style>
    body {
      background-color: #dbeeff;
      color: #1a1a1a;
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .concert {
      background: #f4f9ff;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 5px;
    }

    .date {
      color: #666;
      margin-bottom: 20px;
    }

    .song {
      margin-top: 15px;
    }

    .song-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    audio {
      width: 100%;
      max-width: 500px;
    }
  </style>
</head>

<body>

  <h1>My Concert Archive</h1>

  <p>
    A collection of concert memories.
  </p>

  <div class="concert">
    <h2>Lady Gaga — London 2025</h2>


    

    <div class="song">
      <p class="song-title">Speechless</p>

      <audio controls>
        <source src="gaga_speechless.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="song">
      <p class="song-title">Perfect Celebrity</p>

      <audio controls>
        <source src="gaga_perfect_celebrity.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
    
    <div class="song">
      <p class="song-title">Million Reasons</p>

      <audio controls>
        <source src="gaga_million_reasons.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="song">
      <p class="song-title">Paparazzi</p>

      <audio controls>
        <source src="gaga_paparazzi.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="song">
      <p class="song-title">How Bad Do U Want Me</p>

      <audio controls>
        <source src="gaga_how_bad_do_u_want_me.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>    

    <div class="song">
      <p class="song-title">Die With A Smile</p>

      <audio controls>
        <source src="gaga_die_with_a_smile.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
    
  </div>

</body>
</html>
