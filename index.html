<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Concert Archive</title>

  <style>
    body {
      background-color: #dbeeff;
      color: #1a1a1a;
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .concert {
      background: #f4f9ff;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 5px;
    }

    .date {
      color: #666;
      margin-bottom: 20px;
    }

    a {
      color: #3b82c4;
      text-decoration: none;
      font-size: 18px;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>My Concert Archive</h1>

  <p>
    A collection of concert memories and recordings.
  </p>

  <div class="concert">
    <h2>Lady Gaga — London 2026</h2>

    <p class="date">
      September 2026
    </p>

    <h3>Recordings</h3>

    <ul>
      <li>
        <a href="https://google.com" target="_blank">
          Speechless
        </a>
      </li>
    </ul>
  </div>

</body>
</html>
