<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Concert Archive</title>

  <link rel="icon" type="image/jpeg" href="icon.JPG">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Ma+Shan+Zheng&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 45px;
      color: white;
      font-family: "Quicksand", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 32%),
        radial-gradient(circle at top right, rgba(180,220,255,0.9), transparent 35%),
        linear-gradient(135deg, #dbeeff, #b9dcf7, #eef8ff);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
    }

    h1 {
      font-family: "Caveat", "Ma Shan Zheng", cursive;
      font-size: 76px;
      margin: 0 0 8px;
      color: white;
      text-shadow: 0 4px 18px rgba(74, 132, 180, 0.35);
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
    }

    body > p {
      margin-top: 0;
      color: rgba(255,255,255,0.92);
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(70,120,160,0.25);
    }

    .concert {
      max-width: 820px;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 28px;
      border-radius: 28px;
      margin-top: 34px;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow:
        0 18px 45px rgba(88, 145, 190, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.55);
    }

    h2 {
      font-family: "Caveat", "Ma Shan Zheng", cursive;
      margin: 0 0 20px;
      font-size: 44px;
      color: white;
      text-shadow: 0 3px 14px rgba(60,110,150,0.35);
    }

    .concert-photo {
      width: 100%;
      max-width: 700px;
      display: block;
      border-radius: 24px;
      margin-top: 12px;
      margin-bottom: 28px;
      box-shadow: 0 14px 35px rgba(55, 100, 140, 0.28);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .song {
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 8px 22px rgba(80,130,170,0.14);
    }

    .song-title {
      font-family: "Caveat", "Ma Shan Zheng", cursive;
      font-size: 30px;
      font-weight: 600;
      margin: 0 0 12px;
      color: white;
      text-shadow: 0 2px 10px rgba(70,120,160,0.3);
    }

    audio {
      width: 100%;
      max-width: 560px;
      height: 42px;
      filter: drop-shadow(0 6px 12px rgba(70,120,160,0.18));
    }

    @media (max-width: 600px) {
      body {
        padding: 26px;
      }

      h1 {
        font-size: 54px;
      }

      h2 {
        font-size: 36px;
      }

      .concert {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <h1>My Concert Archive</h1>

  <p>
    A small collection of concert nights and memories.
  </p>

  <div class="concert">

    <h2>单依纯 — 武汉 2026</h2>

    <img src="单依纯_武汉.JPG" class="concert-photo">

    <div class="song">
      <p class="song-title">向日葵朝着夜</p>

      <audio controls>
        <source src="纯_向日葵朝着夜.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">还有什么更好的</p>

      <audio controls>
        <source src="纯_还有什么更好的.mp3" type="audio/mpeg">
      </audio>
    </div>
    

    <div class="song">
      <p class="song-title">爱里</p>

      <audio controls>
        <source src="纯_爱里.mp3" type="audio/mpeg">
      </audio>
    </div>

    
    
    <div class="song">
      <p class="song-title">爱我的时候</p>

      <audio controls>
        <source src="纯_爱我的时候.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">空耳+还你茉莉</p>

      <audio controls>
        <source src="纯_空耳+还你茉莉.mp3" type="audio/mpeg">
      </audio>
    </div>

    
  </div>


  <div class="concert">

    <h2>Lady Gaga — London 2025</h2>


    <img src="gaga_london.JPG" class="concert-photo">

    <div class="song">
      <p class="song-title">Speechless</p>

      <audio controls>
        <source src="gaga_speechless.mp3" type="audio/mpeg">
      </audio>
    </div>

    
    <div class="song">
      <p class="song-title">Perfect Celebrity</p>

      <audio controls>
        <source src="gaga_perfect_celebrity.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">Million Reasons</p>

      <audio controls>
        <source src="gaga_million_reasons.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">Paparazzi</p>

      <audio controls>
        <source src="gaga_paparazzi.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">How Bad Do U Want Me</p>

      <audio controls>
        <source src="gaga_how_bad_do_u_want_me.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="song">
      <p class="song-title">Die With A Smile</p>

      <audio controls>
        <source src="gaga_die_with_a_smile.mp3" type="audio/mpeg">
      </audio>
    </div>

  </div>

</body>
</html>
